<script>
const API_URL = "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE";

function save(){
let emp=[
document.getElementById("empId").value,
document.getElementById("name").value,
document.getElementById("mail").value,
document.getElementById("reporting").value,
document.getElementById("matrix").value,
document.getElementById("role").value,
document.getElementById("team").value,
document.getElementById("totY").value+" "+document.getElementById("totM").value,
document.getElementById("relY").value+" "+document.getElementById("relM").value
];

let finalData=[];

document.querySelectorAll("#body tr").forEach(r=>{
let skill=[];
r.querySelectorAll("input,select").forEach(c=>skill.push(c.value));
finalData.push(emp.concat(skill));
});

fetch(API_URL,{
method:"POST",
body: JSON.stringify(finalData)
})
.then(res=>res.text())
.then(()=>{
alert("Submitted Successfully");

document.getElementById("formPage").style.display="none";
document.getElementById("thankyou").style.display="block";
})
.catch(()=>{
alert("Error submitting data");
});
}
</script>
